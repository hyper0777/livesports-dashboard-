<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sports Live Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>

<style>

body{
background:#0f172a;
font-family:system-ui;
}

.navbar{
background:#020617;
border-bottom:1px solid #1e293b;
}

.card{
background:#020617;
border:1px solid #1e293b;
border-radius:12px;
}

.card-header{
font-weight:600;
font-size:14px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.live-badge{
background:red;
color:white;
font-size:11px;
padding:3px 8px;
border-radius:6px;
margin-left:6px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.4}
100%{opacity:1}
}  

.score-highlight{
font-size:20px;
font-weight:bold;
color:#22c55e;
}

.league-filter{
background:#020617;
color:white;
border:1px solid #334155;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="container-fluid py-2" style="background:#020617;border-bottom:1px solid #1e293b">

<div id="liveTicker" class="d-flex gap-4 overflow-auto small"></div>

</div> 

<input
id="teamSearch"
class="form-control form-control-sm w-auto me-3"
style="max-width:180px"  
placeholder="Search team"
/>
  
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
<div class="container-fluid">

<a class="navbar-brand fw-bold">SPORTS LIVE</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">

<ul class="navbar-nav me-auto">

<li class="nav-item">
<a class="nav-link active sport-btn" data-sport="football">Football</a>
</li>

<li class="nav-item">
<a class="nav-link sport-btn" data-sport="basketball">Basketball</a>
</li>

<li class="nav-item">
<a class="nav-link sport-btn" data-sport="baseball">Baseball</a>
</li>

<li class="nav-item">
<a class="nav-link sport-btn" data-sport="hockey">Hockey</a>
</li>

</ul>

<select id="leagueFilter" class="form-select league-filter w-auto">
<option value="">All Leagues</option>
</select>

</div>
</div>
</nav>

<div class="container-fluid mt-3">

<div class="row g-3">

<!-- LEAGUES -->

<div class="col-lg-3 col-12">

<div class="card">

<div class="card-header">
Leagues
</div>

<div class="card-body p-0">

<api-sports-widget data-type="leagues"></api-sports-widget>

</div>
</div>

</div>

<div class="card mt-3">

<div class="card-header">
⭐ Favorite Teams
</div>

<div class="card-body small" id="favorites"></div>

</div>
  
<!-- MATCHES -->

<div class="col-lg-5 col-12">

<div class="card">

<div class="card-header">
Live Matches <span class="live-badge">LIVE</span>
</div>

<div class="card-body p-0">

<api-sports-widget data-type="games"></api-sports-widget>

</div>

</div>

</div>

<!-- RIGHT PANEL -->

<div class="col-lg-4 col-12">

<!-- MATCH DETAILS -->

<div class="card mb-3">

<div class="card-header">
Match Details
</div>

<div class="card-body p-0" id="game-content">

<api-sports-widget data-type="game"></api-sports-widget>

</div>

</div>

<!-- STANDINGS -->

<div class="card mb-3">

<div class="card-header">
League Standings
</div>

<div class="card-body p-0" id="standings-content"></div>

</div>

<!-- TEAM -->

<div class="card">

<div class="card-header">
Team Info
</div>

<div class="card-body p-0" id="team-content"></div>

</div>

</div>

</div>

<!-- MATCH STATS CHART -->

<div class="row mt-4">

<div class="col-lg-6 col-12">

<div class="card">

<div class="card-header">
Match Statistics
</div>

<div class="card-body">

<canvas id="statsChart"></canvas>

</div>

</div>

</div>

</div>

</div> 
  
<div class="col-lg-6 col-12">

<div class="card">

<div class="card-header">
Possession
</div>

<div class="card-body">
<canvas id="possessionChart"></canvas>
</div>

</div>

</div>


<div class="col-lg-6 col-12 mt-3">

<div class="card">

<div class="card-header">
Team Comparison
</div>

<div class="card-body">
<canvas id="teamCompare"></canvas>
</div>

</div>

</div> 

<!-- API CONFIG -->

<api-sports-widget
data-type="config"
data-key="26145f4e6e26cc25c2d47a945da4a53e"
data-sport="football"
data-theme="dark"
data-show-logos="true"
data-refresh="15"
data-target-team="#team-content"
data-target-game="#game-content"
data-target-standings="#standings-content"
data-target-league=".card-body"
></api-sports-widget>

<script>

////////////////////////////
SPORT SWITCH
////////////////////////////

document.querySelectorAll(".sport-btn").forEach(btn=>{

btn.onclick=function(){

document.querySelectorAll(".sport-btn").forEach(b=>b.classList.remove("active"))
this.classList.add("active")

let sport=this.dataset.sport

let config=document.querySelector('api-sports-widget[data-type="config"]')
config.setAttribute("data-sport",sport)

let widgets=document.querySelectorAll("api-sports-widget")

widgets.forEach(w=>{

if(w.dataset.type!=="config"){

w.innerHTML=""
w.setAttribute("data-sport",sport)

}

})

}

})

////////////////////////////
CHART.JS MATCH STATS
////////////////////////////

const ctx=document.getElementById("statsChart")

new Chart(ctx,{
type:'bar',
data:{
labels:["Shots","Possession","Corners","Fouls"],
datasets:[
{
label:"Home",
data:[12,60,7,10]
},
{
label:"Away",
data:[9,40,4,12]
}
]
},
options:{
responsive:true,
plugins:{
legend:{
labels:{color:"white"}
}
},
scales:{
x:{ticks:{color:"white"}},
y:{ticks:{color:"white"}}
}
}
})

////////////////////////////
LEAGUE FILTER DEMO
////////////////////////////

let leagues=[
"Premier League",
"La Liga",
"Serie A",
"Bundesliga",
"Ligue 1"
]

let filter=document.getElementById("leagueFilter")

leagues.forEach(l=>{
let o=document.createElement("option")
o.text=l
filter.add(o)
})

new Chart(document.getElementById("possessionChart"),{
type:'pie',
data:{
labels:["Home","Away"],
datasets:[{
data:[60,40]
}]
},
options:{
plugins:{
legend:{
labels:{color:"white"}
}
}
}
})

 new Chart(document.getElementById("teamCompare"),{
type:'radar',
data:{
labels:[
"Attack",
"Defense",
"Midfield",
"Goals",
"Pass Accuracy"
],
datasets:[
{
label:"Home",
data:[80,65,70,75,85]
},
{
label:"Away",
data:[72,68,66,70,80]
}
]
},
options:{
plugins:{
legend:{labels:{color:"white"}}
},
scales:{
r:{
ticks:{color:"white"}
}
}
}
})

let favorites=[]

function addFavorite(team){

if(!favorites.includes(team)){
favorites.push(team)
renderFavorites()
}

}

function renderFavorites(){

let box=document.getElementById("favorites")

box.innerHTML=""

favorites.forEach(t=>{
let el=document.createElement("div")
el.innerText=t
box.appendChild(el)
})

}

let ticker=document.getElementById("liveTicker")

let matches=[
"Arsenal 2 - 1 Chelsea 🔴LIVE",
"Barcelona 1 - 0 Madrid 🔴LIVE",
"Inter 0 - 0 Milan",
"Bayern 3 - 2 Dortmund 🔴LIVE"
]

matches.forEach(m=>{
let item=document.createElement("div")
item.innerHTML=`<span class="score-highlight">${m}</span>`
ticker.appendChild(item)
})

 let favorites=[]

function addFavorite(team){

if(!favorites.includes(team)){
favorites.push(team)
renderFavorites()
}

}

function renderFavorites(){

let box=document.getElementById("favorites")

box.innerHTML=""

favorites.forEach(t=>{
let el=document.createElement("div")
el.innerText="⭐ "+t
box.appendChild(el)
})

}
  
</script>

</body>
</html>
